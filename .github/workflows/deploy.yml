name: Deploy

# Dispara ao dar push na main do suite (o "bump" do ponteiro dos submódulos),
# ou manualmente pelo botão "Run workflow" na aba Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Nunca deixa dois deploys rodarem ao mesmo tempo (evita corrida no servidor).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checar secrets (diagnóstico)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          fail=0
          [ -z "$DEPLOY_HOST" ] && { echo "::error::DEPLOY_HOST está vazio"; fail=1; } || echo "DEPLOY_HOST: ok"
          [ -z "$DEPLOY_USER" ] && { echo "::error::DEPLOY_USER está vazio"; fail=1; } || echo "DEPLOY_USER: ok"
          [ -z "$DEPLOY_SSH_KEY" ] && { echo "::error::DEPLOY_SSH_KEY está vazio"; fail=1; } || echo "DEPLOY_SSH_KEY: ok"
          [ -z "$DEPLOY_PORT" ] && echo "DEPLOY_PORT vazio (usará 22)" || echo "DEPLOY_PORT: ok"
          if [ "$fail" = "1" ]; then
            echo "Secrets ausentes. Confira: aba SECRETS (não Variables), como Repository secret, no repo pizzaria-suite."
            exit 1
          fi

      - name: Deploy via SSH no servidor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -euo pipefail

            # Caminho onde o suite foi clonado. Ajuste aqui se for diferente.
            cd ~/pizzaria-suite

            echo "→ Atualizando o suite"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Atualizando submódulos para os commits fixados"
            git submodule sync --recursive
            git submodule update --init --recursive --force

            echo "→ Rebuild e subida dos containers"
            docker compose --profile prod up -d --build --remove-orphans

            echo "→ Limpando imagens antigas"
            docker image prune -f

            echo "✓ Deploy concluído"
