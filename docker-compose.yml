name: pizzaria-suite

services:
  back:
    build: ./apps/pizzaria-back
    restart: unless-stopped
    ports:
      # bind em localhost: acessível na máquina (dev/debug), invisível pra internet
      - "127.0.0.1:3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      # Vazio/ausente = SQLite local no volume. Para Turso: libsql://... + token
      DATABASE_URL: ${DATABASE_URL:-file:/data/dev.db}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-troque-em-producao}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BOT_API_URL: http://bot:3003
      BOT_API_KEY: ${SHARED_API_KEY:-dev-shared-key-pizzaria}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@pizzaria.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_PHONE: ${ADMIN_PHONE:-5500000000000}
      # E-mail de alerta (opcional; vazio = desligado). Ex: Gmail com senha de app
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - back-data:/data

  front:
    build:
      context: ./apps/pizzaria-front
      args:
        # Embutidas no bundle do browser em build time
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${STORE_WHATSAPP_NUMBER:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Runtime (rota server-side da loja): cria pedido no back com a chave,
      # sem expor a chave no navegador. URL interna da rede do compose.
      PIZZA_API_URL: http://back:3001
      STORE_API_KEY: ${SHARED_API_KEY:-dev-shared-key-pizzaria}
    depends_on:
      - back

  bot:
    build: ./apps/whats-pizza-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      PIZZA_API_URL: http://back:3001
      API_KEY: ${SHARED_API_KEY:-dev-shared-key-pizzaria}
      ALLOWED_NUMBERS: ${ALLOWED_NUMBERS:-}
      ATTENDANT_NUMBER: ${ATTENDANT_NUMBER:-}
      SESSIONS_FILE: /data/sessions.json
      ORDERS_LOG_FILE: /data/orders-log.json
      API_PORT: 3003
      # IA de entendimento (opcional; vazio = desligada)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
    volumes:
      - bot-data:/data
      # Sessão do WhatsApp Web — sem isso, precisa escanear o QR a cada restart
      - wwebjs-auth:/app/.wwebjs_auth
    depends_on:
      - back

  # Túnel Cloudflare: expõe front e back via seu domínio SEM abrir portas na VM.
  # Só sobe com: docker compose --profile prod up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: [prod]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?defina TUNNEL_TOKEN no .env (token do túnel no dashboard da Cloudflare)}
    depends_on:
      - front
      - back

volumes:
  back-data:
  bot-data:
  wwebjs-auth:
